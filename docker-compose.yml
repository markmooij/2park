version: '3.8'

services:
  2park-api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: 2park-api
    ports:
      - "8080:8080"
    environment:
      - TWOPARK_EMAIL=${TWOPARK_EMAIL}
      - TWOPARK_PASSWORD=${TWOPARK_PASSWORD}
      - API_TOKEN=${API_TOKEN}
      - RATE_LIMIT_REQUESTS=${RATE_LIMIT_REQUESTS:-10}
      - RATE_LIMIT_WINDOW_SECONDS=${RATE_LIMIT_WINDOW_SECONDS:-60}
      - BROWSER_TIMEOUT=${BROWSER_TIMEOUT:-30}
      - NAVIGATION_TIMEOUT=${NAVIGATION_TIMEOUT:-30}
      - SELECTOR_TIMEOUT=${SELECTOR_TIMEOUT:-10}
      - SESSION_CACHE_TTL=${SESSION_CACHE_TTL:-300}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    volumes:
      - ./logs:/app/logs
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8080/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
